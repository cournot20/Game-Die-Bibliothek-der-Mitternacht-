DIE WELT: Eine unendliche Bibliothek, die nur zwischen Mitternacht und Morgengrauen existiert. Hier wohnen alle Geschichten, die je erz\xE4hlt wurden. Doch die letzte ungeschriebene Fabel der Welt zerf\xE4llt: Ihre drei Fragmente \u2014 Anfang, Mitte und Ende \u2014 haben sich in der Bibliothek versteckt. Findet der Gast sie nicht vor dem ersten Morgenlicht, verschwindet die Fabel f\xFCr immer.

BEWOHNER (nutze sie, erfinde weitere): Quirin, ein pedantischer Katalog-Rabe mit Monokel; die Bibliothekarin, eine Gestalt aus Kerzenrauch, die nur in Zitaten spricht; der Tintenkrake im Archivkeller; B\xFCcher, die fl\xFCstern, schmollen oder bei\xDFen.

REGELN F\xDCR DICH:
1. Schreibe atmosph\xE4risch und konkret: 2 kurze Abs\xE4tze, h\xF6chstens 110 W\xF6rter. Zweite Person Singular, Pr\xE4sens, Deutsch. W\xF6rtliche Rede in \xBB\xAB. Kein Meta-Kommentar.
2. Reagiere ERNSTHAFT auf jede Spieleraktion, auch auf absurde \u2014 Kreativit\xE4t wird belohnt, Konsequenzen sind real. Sag nie \xBBdas geht nicht\xAB, sondern zeige, was stattdessen geschieht.
3. Die drei Fragmente werden nacheinander gefunden, jedes bewacht von einer kleinen Herausforderung (R\xE4tsel, Tausch, Mutprobe oder List). Gib Hinweise, keine L\xF6sungen. Tempo: etwa alle 4\u20136 Z\xFCge ein Fragment.
4. mut (0\u20135): sinkt bei Gefahr, Fehlschl\xE4gen, Unheimlichem; steigt bei Erfolgen, Freundlichkeit, Rast. Bei mut 0: kein Tod \u2014 ein R\xFCckschlag (Gegenstand verloren, woanders erwacht), danach mut auf 2.
5. inventar: F\xFChre es exakt. Gefundenes hinzuf\xFCgen, Benutztes oder Verlorenes entfernen. Gegenst\xE4nde sollen sp\xE4ter Bedeutung bekommen.
6. fragmente z\xE4hlt die gefundenen Fragmente (0\u20133). spielEnde ist NUR true, wenn alle drei vereint sind: Schreibe dann ein feierliches Finale und deute in zwei S\xE4tzen an, wie die neue Fabel beginnt.
7. vorschlaege: genau 3 kurze, verschiedenartige n\xE4chste Aktionen (h\xF6chstens 5 W\xF6rter), die neugierig machen. Der Spieler darf aber jederzeit frei handeln.

@import url('https://fonts.googleapis.com/css2?family=IM+Fell+English+SC&family=IM+Fell+English:ital@0;1&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap');

.biblio-root{
  --tiefe:#0d0a16; --nacht:#161226; --himmel:#241c3a;
  --papier:#e9d8ae; --papier-dim:#a99a78; --gold:#caa24b; --gold-hell:#f0d894;
  --glut:#ff9b3d; --wachs:#a34a3c; --linie:#37304f;
  height:100vh; height:100dvh; width:100%;
  background: radial-gradient(1100px 700px at 50% -12%, var(--himmel) 0%, var(--nacht) 46%, var(--tiefe) 100%);
  color:var(--papier);
  font-family:'EB Garamond', Georgia, 'Times New Roman', serif;
  display:flex; flex-direction:column; overflow:hidden;
}
.biblio-root *{ box-sizing:border-box; }

/* --- Flammen --- */
.flame-anim{ animation: flicker 2.1s ease-in-out infinite; }
.flame-glow{ filter: drop-shadow(0 0 7px rgba(255,170,60,.85)) drop-shadow(0 0 18px rgba(255,140,40,.35)); }
@keyframes flicker{
  0%,100%{ transform:scale(1) rotate(-1deg); }
  22%{ transform:scale(1.06,.94) rotate(1.6deg); }
  50%{ transform:scale(.95,1.07) rotate(-.6deg); }
  76%{ transform:scale(1.03,.97) rotate(-2.2deg); }
}
.mutflame.lit path:first-child{ filter: drop-shadow(0 0 4px rgba(255,160,60,.8)); }
.frag.lit path{ filter: drop-shadow(0 0 5px rgba(230,190,90,.8)); }

/* --- Titel- und Schl\xFCsselbildschirm --- */
.title-screen{
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  text-align:center; padding:calc(24px + env(safe-area-inset-top)) 24px calc(24px + env(safe-area-inset-bottom)); gap:14px;
}
.eyebrow{
  font-variant:small-caps; letter-spacing:.28em;
  color:var(--gold); font-size:13px; margin-top:10px;
}
.big-title{
  font-family:'IM Fell English SC', Georgia, serif; font-weight:400;
  font-size:clamp(30px, 6vw, 52px); line-height:1.12; margin:0; max-width:16ch;
  color:var(--gold-hell);
  text-shadow:0 0 26px rgba(230,180,90,.22);
}
.big-title.small{ font-size:clamp(24px, 5vw, 36px); max-width:20ch; }
.premise{
  max-width:46ch; font-size:17px; line-height:1.65; color:var(--papier);
  font-style:italic; margin:4px 0 8px;
}
.key-input{ width:min(420px, 100%); text-align:center; font-style:normal; letter-spacing:.04em; }
.key-hint{ max-width:44ch; font-size:14px; color:#d8a08e; font-style:italic; }
.enter-btn{
  font-family:'IM Fell English SC', Georgia, serif; font-size:19px; letter-spacing:.06em;
  color:var(--gold-hell); background:rgba(202,162,75,.08);
  border:1px solid var(--gold); border-radius:3px; padding:12px 30px; cursor:pointer;
  transition:background .25s, box-shadow .25s, transform .15s;
}
.enter-btn:hover{ background:rgba(202,162,75,.18); box-shadow:0 0 24px rgba(220,170,80,.25); }
.enter-btn:active{ transform:translateY(1px); }
.enter-btn:focus-visible, .chip:focus-visible, .send:focus-visible, .cmd:focus-visible, .ghost-link:focus-visible{
  outline:2px solid var(--gold-hell); outline-offset:2px;
}
.footnote{ font-size:13.5px; color:var(--papier-dim); font-style:italic; margin-top:6px; }
.ghost-link{
  background:none; border:none; cursor:pointer; margin-top:2px;
  font-family:'EB Garamond', serif; font-size:12.5px; letter-spacing:.14em; font-variant:small-caps;
  color:var(--papier-dim); text-decoration:underline; text-underline-offset:3px;
}
.ghost-link:hover{ color:var(--gold); }

/* --- Kopfzeile --- */
.game{ flex:1; display:flex; flex-direction:column; min-height:0; }
.topbar{
  border-bottom:1px solid var(--linie);
  padding:calc(10px + env(safe-area-inset-top)) 16px 8px;
  background:linear-gradient(rgba(13,10,22,.65), rgba(13,10,22,.2));
  backdrop-filter:blur(2px);
}
.topbar-row{ display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
.brand{ display:flex; align-items:center; gap:8px; min-width:0; }
.brand-candle{ display:inline-flex; transform:translateY(2px); }
.brand-name{
  font-family:'IM Fell English SC', Georgia, serif; font-size:16.5px; color:var(--gold-hell);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.label{
  font-variant:small-caps; letter-spacing:.22em; font-size:11.5px; color:var(--papier-dim);
  margin-right:7px;
}
.ort{ font-size:15px; font-style:italic; color:var(--papier); }
.stats{ margin-top:7px; justify-content:flex-start; gap:26px; }
.stat{ display:flex; align-items:center; }
.flames{ display:inline-flex; gap:4px; align-items:center; }
.inv-row{ margin-top:8px; display:flex; align-items:center; gap:7px; flex-wrap:wrap; }
.inv-chip{
  font-size:13px; color:var(--papier); border:1px solid var(--linie); border-radius:2px;
  padding:2px 9px; background:rgba(233,216,174,.05); font-style:italic;
}

/* --- Geschichte --- */
.story{
  flex:1; overflow-y:auto; padding:26px 20px 18px; scroll-behavior:smooth;
  overscroll-behavior:contain; -webkit-overflow-scrolling:touch;
}
.story::-webkit-scrollbar{ width:9px; }
.story::-webkit-scrollbar-thumb{ background:var(--linie); border-radius:6px; }
.entry-narr{
  max-width:62ch; margin:0 auto 26px; font-size:18.5px; line-height:1.72;
  white-space:pre-line; text-shadow:0 1px 0 rgba(0,0,0,.4);
}
.entry-narr::first-letter{
  font-family:'IM Fell English SC', Georgia, serif;
  font-size:3.1em; float:left; line-height:.82; padding:4px 10px 0 0;
  color:var(--gold);
}
.entry-narr.finale{
  border-left:2px solid var(--gold); padding-left:18px;
  background:linear-gradient(90deg, rgba(202,162,75,.09), transparent 70%);
}
.quill{ color:var(--gold); animation:quillblink 1s steps(2) infinite; margin-left:2px; }
@keyframes quillblink{ 50%{ opacity:0; } }
.entry-player{
  max-width:62ch; margin:0 auto 24px; text-align:right;
  font-style:italic; font-size:16.5px; color:var(--gold-hell); opacity:.92;
  animation:rise .35s ease both;
}
.player-mark{ color:var(--gold); font-style:normal; margin-right:4px; }
@keyframes rise{ from{ opacity:0; transform:translateY(6px);} to{ opacity:.92; transform:none;} }
.entry-error{
  max-width:62ch; margin:0 auto 24px; font-size:15.5px; font-style:italic;
  color:#d8a08e; border-left:2px solid var(--wachs); padding-left:14px;
  display:flex; flex-direction:column; gap:10px; align-items:flex-start;
}
.error-actions{ display:flex; gap:8px; flex-wrap:wrap; }
.thinking{
  max-width:62ch; margin:0 auto 22px; display:flex; align-items:center; gap:10px;
  font-style:italic; color:var(--papier-dim); font-size:16px;
  animation:pulse 2.4s ease-in-out infinite;
}
.think-dot{
  width:9px; height:11px; border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;
  background:radial-gradient(circle at 50% 70%, #ffe9a8, #e2701c);
  box-shadow:0 0 8px rgba(255,160,60,.8);
  animation:flicker 1.6s ease-in-out infinite;
}
@keyframes pulse{ 0%,100%{ opacity:.65; } 50%{ opacity:1; } }
.finale-banner{
  max-width:62ch; margin:6px auto 30px; text-align:center; display:flex;
  flex-direction:column; align-items:center; gap:12px; padding:22px 16px;
  border-top:1px solid var(--gold); border-bottom:1px solid var(--gold);
}
.frags-row{ display:flex; gap:10px; }
.finale-text{
  font-family:'IM Fell English SC', Georgia, serif; font-size:19px; color:var(--gold-hell);
}
.restart{ margin-top:2px; }

/* --- Eingabe --- */
.bottom{
  border-top:1px solid var(--linie);
  padding:12px 16px calc(10px + env(safe-area-inset-bottom));
  background:rgba(13,10,22,.55);
}
.chips{ display:flex; gap:8px; flex-wrap:wrap; max-width:66ch; margin:0 auto 10px; }
.chip{
  font-family:'EB Garamond', serif; font-size:14.5px; color:var(--papier);
  background:transparent; border:1px solid rgba(202,162,75,.45); border-radius:2px;
  padding:6px 13px; cursor:pointer; transition:background .2s, border-color .2s;
}
.chip:hover{ background:rgba(202,162,75,.12); border-color:var(--gold); }
.inputbar{ display:flex; gap:9px; max-width:66ch; margin:0 auto; }
.cmd{
  flex:1; min-width:0; font-family:'EB Garamond', serif; font-size:17px; font-style:italic;
  color:var(--papier); background:rgba(233,216,174,.05);
  border:1px solid var(--linie); border-radius:2px; padding:11px 14px;
}
.cmd::placeholder{ color:var(--papier-dim); }
.cmd:focus{ border-color:var(--gold); outline:none; background:rgba(233,216,174,.08); }
.cmd:disabled{ opacity:.55; }
.send{
  display:inline-flex; align-items:center; justify-content:center; width:46px;
  color:var(--gold-hell); background:rgba(202,162,75,.1);
  border:1px solid var(--gold); border-radius:2px; cursor:pointer;
  transition:background .2s, box-shadow .2s;
}
.send:hover:not(:disabled){ background:rgba(202,162,75,.2); box-shadow:0 0 14px rgba(220,170,80,.25); }
.send:disabled{ opacity:.4; cursor:default; }
.colophon{
  max-width:66ch; margin:8px auto 0; text-align:center;
  font-size:12px; font-variant:small-caps; letter-spacing:.18em; color:var(--papier-dim);
}

@media (max-width:480px){
  .entry-narr{ font-size:17px; }
  .brand-name{ font-size:14.5px; }
  .stats{ gap:16px; }
}
@media (prefers-reduced-motion: reduce){
  .flame-anim, .think-dot, .quill, .entry-player, .thinking{ animation:none; }
  .story{ scroll-behavior:auto; }
}
